<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">

  <script>
    function validate(){
        var payment = document.myform.payment.value;

        if(payment=="")
        {
            alert("You've not entered any Amount for Payment");
            document.myform.payment.focus();
            return false;
        }
     
    }
  </script>
</head>
<body>
<div class="bg-img">
  <form name="myform" action="insert.php" method="POST" class="container" onsubmit="return validate()">
    <p class="login-text">Login</p>
    <p class="fname-text">
    <label for="first-name"><b>First Name</b></label></p>
    <input type="text" id="first-name" placeholder="Enter First Name" name="first_name" required> 
    <p class="sname-text">
    <label for="second-name"><b>Second Name</b></label></p>
    <input type="text" id="second-name" placeholder="Enter Second Name" name="last_name" required>
    <p class="dob-text">
    <label for="dob"><b>Date Of Birth</b></label></p>
    <input type="date" id="dob" placeholder="DD/MM/YYYY" name="age" required> 
    <p class="payment-text">
    <label for="payment"><b>Payment</b></label></p>
    <input type="text" id="payment" placeholder="Enter the Amount" name="payment"> 
    <input type="submit" class="btn" value="Login"></input>
  </form>
</div>
</body>
</html>
